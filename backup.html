<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bhajan Kirtan Roster</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="shell" id="shell"></div>

<!-- SINGER MODAL -->
<div class="modal-bg" id="singer-modal">
  <div class="modal">
    <div class="modal-title" id="singer-modal-title">Add singer</div>
    <div class="field"><label>Name</label><input type="text" id="m-name" placeholder="Full name" /></div>
    <div class="field"><label>Last sang date</label><input type="date" id="m-date" /></div>
    <div class="field">
      <label>Tags</label>
      <div class="tags-check">
        <label><input type="checkbox" value="regular" /> Regular</label>
        <label><input type="checkbox" value="special" /> Special occasions only</label>
        <label><input type="checkbox" value="child" /> Child</label>
        <label><input type="checkbox" value="beginner" /> Beginner</label>
        <label><input type="checkbox" value="senior" /> Senior</label>
        <label><input type="checkbox" value="unavailable" /> Currently unavailable</label>
      </div>
    </div>
    <div class="field"><label>Notes / comments</label><textarea id="m-notes" rows="2" placeholder="e.g. Prefers evening, contact via daughter…"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeSingerModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSinger()">Save singer</button>
    </div>
  </div>
</div>

<!-- INSTRUMENTALIST MODAL -->
<div class="modal-bg" id="inst-modal">
  <div class="modal">
    <div class="modal-title" id="inst-modal-title">Add instrumentalist</div>
    <div class="field"><label>Name</label><input type="text" id="im-name" placeholder="Full name" /></div>
    <div class="field"><label>Instrument(s)</label><input type="text" id="im-instrument" placeholder="e.g. Harmonium, Tabla, Guitar" /></div>
    <div class="field"><label>Availability</label>
      <select id="im-availability">
        <option value="available">Available</option>
        <option value="occasional">Occasional</option>
        <option value="unavailable">Currently unavailable</option>
      </select>
    </div>
    <div class="field"><label>Notes / comments</label><textarea id="im-notes" rows="2" placeholder="e.g. Available weekends only…"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeInstModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveInstrumentalist()">Save</button>
    </div>
  </div>
</div>

<!-- BHAJAN MODAL -->
<div class="modal-bg" id="bhajan-modal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-title" id="bhajan-modal-title">Bhajan details</div>
    <div class="field">
      <label>Bhajan name</label>
      <input type="text" id="bm-bhajan" placeholder="e.g. Jai Jai Sai Ram" oninput="updateSaiSearch()" />
    </div>
    <div class="field">
      <label>Sai Rhythms link</label>
      <div class="input-with-btn">
        <input type="url" id="bm-link" placeholder="https://sairhythms.sathyasai.org/song/…" />
        <a id="bm-search-btn" href="https://sairhythms.sathyasai.org/songs" target="_blank" class="btn btn-sm" style="text-decoration:none;">🔍 Search</a>
      </div>
      <div class="hint">Search Sai Rhythms, then paste the song page URL above.</div>
    </div>
    <div class="field">
      <label>Lyrics / notes</label>
      <textarea id="bm-lyrics" rows="7" placeholder="Paste bhajan lyrics here, or add notes (key, tempo, language)…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeBhajanModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBhajan()">Save details</button>
    </div>
  </div>
</div>

<!-- CSV IMPORT MODAL -->
<div class="modal-bg" id="import-modal">
  <div class="modal" style="max-width:580px;" id="import-modal-inner"></div>
</div>

<!-- SEARCHABLE DROPDOWN OVERLAY -->
<div id="search-dropdown" class="search-dropdown" style="display:none;">
  <div class="search-dropdown-inner">
    <input type="text" id="search-dropdown-input" class="search-dropdown-input" placeholder="Search singers…" oninput="filterSearchDropdown()" />
    <div id="search-dropdown-list" class="search-dropdown-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
